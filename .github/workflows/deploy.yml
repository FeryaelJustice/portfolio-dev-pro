name: Deploy Astro to Hostinger

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro
        run: npm run build

      - name: Backup current public_html → old_portfolio_backup
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y lftp -q
          lftp -c "
            set ftp:ssl-allow yes;
            set ssl:verify-certificate no;
            set net:timeout 30;
            set ftp:password \"$FTP_PASS\";
            open -u \"$FTP_USER\" ftp://$FTP_SERVER;
            mirror --parallel=5 --exclude .ftpquota public_html /tmp/backup;
            mkdir -p old_portfolio_backup;
            mirror --parallel=5 --reverse --delete /tmp/backup old_portfolio_backup;
            bye
          "

      - name: Deploy dist/ → public_html via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
