name: Deploy Astro to Hostinger

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro
        run: npm run build

      - name: Backup current public_html → old_portfolio_backup
        timeout-minutes: 5
        continue-on-error: true
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y lftp -q
          lftp -c "set net:timeout 20; set net:max-retries 1; set ftp:ssl-allow no; set ftp:passive-mode yes; set net:connection-limit 3; open -u \"$FTP_USER,$FTP_PASS\" ftp://$FTP_SERVER; mirror --continue --exclude .ftpquota public_html /tmp/backup; mkdir -p old_portfolio_backup; mirror --continue --reverse --delete /tmp/backup old_portfolio_backup; bye"

      - name: Deploy dist/ → public_html via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
